<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0E1130" />
  <title>Numble — Level up your math</title>
  <meta name="description" content="Numble: a fun, game-like way to learn math from kindergarten to college, with Pip your AI voice tutor." />

  <!-- Friendly rounded brand fonts (load online; graceful system fallback offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='52' r='34' fill='%2322D3EE'/%3E%3Ccircle cx='40' cy='48' r='7' fill='%23fff'/%3E%3Ccircle cx='62' cy='48' r='7' fill='%23fff'/%3E%3Ccircle cx='41' cy='49' r='3' fill='%230E1130'/%3E%3Ccircle cx='63' cy='49' r='3' fill='%230E1130'/%3E%3C/svg%3E" />

  <link rel="stylesheet" href="assets/styles.css?v=4" />
</head>
<body>
  <div id="app" class="app">
    <!-- Top HUD: streak, gems, hearts, level/xp, settings -->
    <header id="hud" class="hud" hidden></header>

    <!-- Screens render here -->
    <main id="screen" class="screen"></main>

    <!-- Bottom tab bar -->
    <nav id="tabbar" class="tabbar" hidden></nav>
  </div>

  <!-- Full-screen lesson player overlay -->
  <div id="lesson" class="lesson-overlay" hidden></div>

  <!-- Generic modal -->
  <div id="modal" class="modal-overlay" hidden></div>

  <!-- Toast + confetti -->
  <div id="toast" class="toast" hidden></div>
  <canvas id="confetti" class="confetti" hidden></canvas>

  <!-- Data + engine (classic scripts so it runs from file:// with no build step) -->
  <script src="data/curriculum.js?v=4"></script>
  <script src="assets/mascot.js?v=4"></script>
  <script src="assets/audio.js?v=4"></script>
  <script src="assets/voice.js?v=4"></script>
  <script src="assets/app.js?v=4"></script>
</body>
</html>
